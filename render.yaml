services:
  - type: web
    name: ff-tournament
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm install -g pnpm && pnpm install --frozen-lockfile && pnpm --filter @workspace/freefire-tournament run build && cp -r artifacts/freefire-tournament/dist/public artifacts/api-server/dist/public || true && pnpm --filter @workspace/api-server run build && cp -r artifacts/freefire-tournament/dist/public artifacts/api-server/dist/public
    startCommand: node artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: PORT
        value: 10000
